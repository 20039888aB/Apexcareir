# Render Blueprint — Free-tier friendly (no app code changes required)
#
# Architecture:
#   apexcareir-api  → Docker Django API (one free web service)
#   apexcareir-web  → Static Site (React build on CDN — does not sleep like Docker web)
#
# Why this works better on free Render:
#   - Free web services cannot reliably talk to each other over private network
#   - Static site calls the public API URL (VITE_API_BASE_URL) over HTTPS
#   - No nginx BACKEND_HOST / backend:8000 proxy needed
#
# Existing Postgres: do NOT recreate. In the API service dashboard, set
# DATABASE_URL to your existing Internal Database URL.

services:
  - type: web
    name: apexcareir-api
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./Dockerfile
    dockerContext: ./backend
    healthCheckPath: /api/v1/health/
    envVars:
      - key: DJANGO_ENV
        value: production
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      # Paste your existing Internal Postgres URL in the dashboard if sync: false
      - key: DATABASE_URL
        sync: false
      - key: ALLOWED_HOSTS
        value: ".onrender.com,apexcareir-api.onrender.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://apexcareir-web.onrender.com,https://apexcareir-api.onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://apexcareir-web.onrender.com"
      - key: FRONTEND_APP_URL
        value: "https://apexcareir-web.onrender.com"
      - key: FRONTEND_PASSWORD_RESET_URL
        value: "https://apexcareir-web.onrender.com/admin1/reset-password"
      - key: API_PUBLIC_URL
        value: "https://apexcareir-api.onrender.com"
      - key: BACKEND_PUBLIC_URL
        value: "https://apexcareir-api.onrender.com"
      - key: TIME_ZONE
        value: Africa/Nairobi
      - key: AI_USE_OLLAMA
        value: "False"

  - type: web
    name: apexcareir-web
    runtime: static
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    envVars:
      # Built into the React bundle — must be the public Django URL + /api/v1
      - key: VITE_API_BASE_URL
        value: https://apexcareir-api.onrender.com/api/v1
    routes:
      # SPA: React Router (admin1, book-appointment, etc.)
      - type: rewrite
        source: /*
        destination: /index.html
