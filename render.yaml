# Render Blueprint — Free-tier friendly
#
# You need THREE pieces:
#   1) Postgres          → Apexcareir (you already have this)
#   2) apexcareir-api    → Django (this talks to Postgres)
#   3) Frontend          → Static Site or nginx (talks to the API only)
#
# The frontend NEVER uses DATABASE_URL. Only the API does.

services:
  - type: web
    name: apexcareir-api
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /api/v1/health/
    envVars:
      - key: DJANGO_ENV
        value: production
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      # Set this in the dashboard to your Internal Database URL
      - key: DATABASE_URL
        sync: false
      - key: ALLOWED_HOSTS
        value: ".onrender.com,apexcareir-api.onrender.com"
      # Your live site today:
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://apexcareir.onrender.com,https://apexcareir-api.onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://apexcareir.onrender.com"
      - key: FRONTEND_APP_URL
        value: "https://apexcareir.onrender.com"
      - key: FRONTEND_PASSWORD_RESET_URL
        value: "https://apexcareir.onrender.com/admin1/reset-password"
      - key: API_PUBLIC_URL
        value: "https://apexcareir-api.onrender.com"
      - key: BACKEND_PUBLIC_URL
        value: "https://apexcareir-api.onrender.com"
      - key: TIME_ZONE
        value: Africa/Nairobi
      - key: AI_USE_OLLAMA
        value: "False"
      # Email / SMTP — set EMAIL_HOST_PASSWORD in the Render dashboard (Gmail App Password)
      - key: DEFAULT_FROM_EMAIL
        value: apexcareir@gmail.com
      - key: EMAIL_HOST
        value: smtp.gmail.com
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_HOST_USER
        value: apexcareir@gmail.com
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: EMAIL_USE_TLS
        value: "True"
      - key: EMAIL_TIMEOUT
        value: "20"
      - key: ENABLE_EMBEDDED_SCHEDULER
        value: "True"

  - type: web
    name: apexcareir-web
    runtime: static
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    envVars:
      # Built into the React app at build time — must be the PUBLIC API URL
      - key: VITE_API_BASE_URL
        value: https://apexcareir-api.onrender.com/api/v1
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
