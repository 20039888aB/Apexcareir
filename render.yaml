# Render Blueprint — wires frontend nginx → Django over private network.
# https://render.com/docs/blueprint-spec
#
# After connecting this repo as a Blueprint, services are named:
#   apexcareir-api  (Django)
#   apexcareir-web  (nginx + React)
# BACKEND_HOST is set automatically to apexcareir-api:10000

databases:
  - name: apexcareir
    plan: free
    databaseName: apexcareir
    user: apexcareir_user

services:
  - type: web
    name: apexcareir-api
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./Dockerfile
    dockerContext: ./backend
    healthCheckPath: /api/v1/health/
    envVars:
      - key: DJANGO_ENV
        value: production
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: apexcareir
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://apexcareir-web.onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://apexcareir-web.onrender.com"
      - key: FRONTEND_APP_URL
        value: "https://apexcareir-web.onrender.com"
      - key: FRONTEND_PASSWORD_RESET_URL
        value: "https://apexcareir-web.onrender.com/admin1/reset-password"
      - key: TIME_ZONE
        value: Africa/Nairobi
      - key: AI_USE_OLLAMA
        value: "False"

  - type: web
    name: apexcareir-web
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      # Django service name + Render private PORT (default 10000)
      - key: BACKEND_HOST
        value: apexcareir-api:10000
